name: KYRON OS CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - p0-security-integrity-foundation
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kyron-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck / lint
        run: npm run lint

      - name: Build
        run: npm run build
